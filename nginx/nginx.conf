upstream backend {
    server backend:5000;
}

server {
    listen 80;
    client_max_body_size 2048m;
    server_name _;

    # Frontend estático — sem Node, sem Vite
    root /var/www/frontend;
    index index.html;

    # HTML nunca cacheado — sempre fresco
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS/SVG — sem cache (home server, LAN rápida)
    location ~* ^(?!/static/).*\.(js|css|woff2|ico|png|jpg|jpeg|gif|svg)$ {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # API proxy → Flask
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Static uploads (thumbs, roms) → Flask
    location /static/ {
        proxy_pass http://backend/static/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ROMs direto do disco
    location /roms/ {
        alias /emulatorjs/roms/;
        add_header Cache-Control "public, max-age=86400";
    }
}
