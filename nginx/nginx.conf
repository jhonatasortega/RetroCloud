events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Aumentar timeout para ROMs grandes
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    client_max_body_size 600M;

    upstream backend {
        server backend:5000;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream emulatorjs {
        server emulatorjs:80;
    }

    server {
        listen 80;
        server_name _;

        # Gzip para economizar banda (importante para TVs em Wi-Fi)
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # Frontend React (SPA — todas as rotas caem no index.html)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files do backend (thumbnails, uploads)
        location /static/ {
            proxy_pass http://backend/static/;
            proxy_set_header Host $host;
            # Cache de imagens no browser (capas dos jogos)
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # EmulatorJS — assets e interface do emulador
        location /emulator/ {
            proxy_pass http://emulatorjs/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Necessário para assets grandes (ROMs, cores)
            proxy_buffering off;
            proxy_read_timeout 300;
        }
    }
}

