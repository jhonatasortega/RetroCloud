services:

  backend:
    container_name: retrocloud_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./emulatorjs:/emulatorjs
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///database.db}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
      - THEGAMESDB_API_KEY=${THEGAMESDB_API_KEY:-}
      - SCREENSCRAPER_USER=${SCREENSCRAPER_USER:-}
      - SCREENSCRAPER_PASS=${SCREENSCRAPER_PASS:-}
      - EMULATION_MODE=${EMULATION_MODE:-local}
    networks:
      - retrocloud_network
    restart: unless-stopped

  frontend:
    container_name: retrocloud_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=/api
      - VITE_EMULATION_MODE=${EMULATION_MODE:-local}
    depends_on:
      - backend
    networks:
      - retrocloud_network
    restart: unless-stopped

  emulatorjs:
    container_name: retrocloud_emulatorjs
    image: lscr.io/linuxserver/emulatorjs:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./emulatorjs/config:/config
      - ./emulatorjs/data:/data
      - ./emulatorjs/roms:/roms
    ports:
      - "3001:3000"
      - "3002:80"
    networks:
      - retrocloud_network
    restart: unless-stopped

  nginx:
    container_name: retrocloud_nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - emulatorjs
    networks:
      - retrocloud_network
    restart: unless-stopped

networks:
  retrocloud_network:
    driver: bridge

