<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroCloud — Biblioteca</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/library.html">RetroCloud</a>
  <div class="navbar-nav">
    <a class="nav-link active" href="/library.html">Biblioteca</a>
    <a class="nav-link" href="/admin.html" id="adminLink" style="display:none">Admin</a>
    <span class="nav-badge" id="inputBadge">🖥 Desktop</span>
    <button class="btn btn-secondary btn-sm" id="rvBtn" style="display:none">🎮 RetroVision</button>
    <button class="btn btn-secondary btn-sm" id="logoutBtn">Sair</button>
  </div>
</nav>

<div class="filters">
  <div class="search-wrap">
    <input class="input" type="search" id="searchInput" placeholder="Buscar jogos...">
  </div>
  <div class="sys-filters" id="sysFilters">
    <button class="sys-btn active" data-sys="">Todos</button>
  </div>
</div>

<!-- Sessões ativas -->
<div id="activeSessions" style="display:none;padding:0 20px 4px;max-width:1200px;margin:0 auto"></div>

<div class="container">
  <div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
    <p class="text-muted text-sm" id="gameCount">Carregando...</p>
  </div>
  <div class="game-grid" id="gameGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script type="module">
import { api } from '/js/api.js?v=2'
import { requireAuth, logout } from '/js/auth.js?v=2'
import { startGamepad, onGamepad, BTN, hasGamepad } from '/js/gamepad.js?v=2'
import { toastErr } from '/js/ui.js?v=2'

const PER_PAGE = 24
let allGames = [], filtered = [], page = 1, activeSys = ''

const SYS_COLORS = {
  snes:'sys-snes', n64:'sys-n64', ps1:'sys-ps1', psx:'sys-ps1',
  gba:'sys-gba', gbc:'sys-gbc', gb:'sys-gb',
  megadrive:'sys-megadrive', genesis:'sys-megadrive', md:'sys-megadrive', nes:'sys-nes',
}

const user = await requireAuth()
if (!user) throw new Error()

// Admin link
if (user.is_admin) document.getElementById('adminLink').style.display = ''

// Logout
document.getElementById('logoutBtn').addEventListener('click', logout)

// Carrega sistemas
const sysData = await api.systems().catch(() => ({ systems: [] }))
const sysFilters = document.getElementById('sysFilters')
;(sysData.systems || []).forEach(s => {
  const btn = document.createElement('button')
  btn.className = 'sys-btn'
  btn.dataset.sys = s
  btn.textContent = s.toUpperCase()
  sysFilters.appendChild(btn)
})

sysFilters.addEventListener('click', e => {
  const btn = e.target.closest('.sys-btn')
  if (!btn) return
  sysFilters.querySelectorAll('.sys-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  activeSys = btn.dataset.sys
  page = 1
  applyFilter()
})

// Busca
let searchTimer
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => { page = 1; applyFilter() }, 250)
})

// Carrega jogos e sessões ativas em paralelo
const [gData, sessData] = await Promise.all([
  api.games().catch(() => ({ games: [] })),
  api.getActiveSessions().catch(() => ({ sessions: [] })),
])
allGames = gData.games || []
renderSessions(sessData.sessions || [])
applyFilter()
setInterval(async () => {
  const s = await api.getActiveSessions().catch(() => ({ sessions: [] }))
  renderSessions(s.sessions || [])
}, 30000)

function renderSessions(sessions) {
  const el = document.getElementById('activeSessions')
  if (!sessions.length) { el.style.display = 'none'; return }
  el.style.display = ''
  el.innerHTML = `
    <div style="margin-bottom:10px">
      <span style="font-size:13px;font-weight:600;color:var(--accent)">🎮 Jogando agora</span>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      ${sessions.map(s => `
        <a href="/player.html?id=${s.rom_id}&join=${encodeURIComponent(s.room_id)}"
           style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);
                  border-radius:10px;padding:10px 14px;text-decoration:none;min-width:220px;
                  transition:border-color 0.15s;cursor:pointer"
           onmouseover="this.style.borderColor='var(--accent)'"
           onmouseout="this.style.borderColor='var(--border)'">
          <div style="width:44px;height:44px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#222;display:flex;align-items:center;justify-content:center">
            ${s.rom_thumb
              ? `<img src="${s.rom_thumb}" style="width:100%;height:100%;object-fit:cover">`
              : `<span style="font-size:20px">🎮</span>`}
          </div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(s.rom_nome||'Jogo')}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(s.host_nome)} está jogando</div>
            <div style="font-size:11px;color:var(--accent);margin-top:2px">Jogar junto →</div>
          </div>
        </a>
      `).join('')}
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:14px 0 0">
  `
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim()
  filtered = allGames.filter(g => {
    const matchSys = !activeSys || g.sistema?.toLowerCase() === activeSys.toLowerCase()
    const matchQ   = !q || g.nome?.toLowerCase().includes(q)
    return matchSys && matchQ
  })
  render()
}

function render() {
  const total = filtered.length
  const totalPages = Math.ceil(total / PER_PAGE)
  if (page > totalPages) page = Math.max(1, totalPages)
  const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE)

  document.getElementById('gameCount').textContent =
    `${total} jogo${total !== 1 ? 's' : ''}${activeSys ? ' · ' + activeSys.toUpperCase() : ''}`

  const grid = document.getElementById('gameGrid')
  if (!slice.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:12px">🕹</div>
      <p>Nenhum jogo encontrado</p>
    </div>`
  } else {
    grid.innerHTML = slice.map(g => gameCardHTML(g)).join('')
    grid.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        window.location.href = `/player.html?id=${card.dataset.id}`
      })
    })
  }

  // Paginação
  const pag = document.getElementById('pagination')
  if (totalPages <= 1) { pag.innerHTML = ''; return }
  pag.innerHTML = `
    <button class="btn btn-secondary btn-sm" ${page===1?'disabled':''} id="prevPage">← Anterior</button>
    <span class="page-info">${page} / ${totalPages}</span>
    <button class="btn btn-secondary btn-sm" ${page===totalPages?'disabled':''} id="nextPage">Próxima →</button>
  `
  pag.querySelector('#prevPage')?.addEventListener('click', () => { page--; render() })
  pag.querySelector('#nextPage')?.addEventListener('click', () => { page++; render() })
}

function gameCardHTML(g) {
  const sys = g.sistema?.toLowerCase() || ''
  const color = SYS_COLORS[sys] || ''
  const thumb = g.thumb
    ? `<img src="${g.thumb}" alt="${esc(g.nome)}" loading="lazy" decoding="async"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
            style="width:100%;height:100%;object-fit:cover;display:block">
       <div class="no-thumb" style="display:none"><span>🎮</span><span>${esc(g.nome)}</span></div>`
    : `<div class="no-thumb"><span>🎮</span><span>${esc(g.nome)}</span></div>`

  return `<div class="game-card" data-id="${g.id}">
    <div class="game-card-thumb">
      ${thumb}
      <span class="sys-badge ${color}">${esc(g.sistema?.toUpperCase() || '')}</span>
    </div>
    <div class="game-card-info">
      <div class="game-card-name">${esc(g.nome)}</div>
    </div>
  </div>`
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// Gamepad — detecta e mostra botão RetroVision
const rvBtn = document.getElementById('rvBtn')
const badge = document.getElementById('inputBadge')

function updateInputMode() {
  const gp = hasGamepad()
  badge.textContent = gp ? '🕹 Controle' : '🖥 Desktop'
  rvBtn.style.display = gp ? '' : 'none'
}
window.addEventListener('gamepadconnected', () => {
  updateInputMode()
  // Redireciona automaticamente para RetroVision quando controle conecta
  if (!window.location.pathname.includes('retrovision')) {
    window.location.href = '/retrovision.html'
  }
})
window.addEventListener('gamepaddisconnected', updateInputMode)
updateInputMode()

// Se já tem controle conectado ao carregar, vai para RetroVision
if (hasGamepad()) {
  window.location.href = '/retrovision.html'
}

rvBtn.addEventListener('click', () => { window.location.href = '/retrovision.html' })

// Gamepad navegação básica
startGamepad()
onGamepad((btn, type) => {
  if (btn === BTN.A && type === 'press') {
    const focused = document.activeElement?.closest('.game-card')
    if (focused) window.location.href = `/player.html?id=${focused.dataset.id}`
  }
  if (btn === BTN.RB && type === 'press') { page++; render() }
  if (btn === BTN.LB && type === 'press') { page = Math.max(1, page-1); render() }
})
</script>
</body>
</html>
