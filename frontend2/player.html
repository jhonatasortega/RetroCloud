<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroCloud — Jogando</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="margin:0;background:#000;display:flex;flex-direction:column;min-height:100vh">

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <button class="btn btn-secondary btn-sm" id="backBtn">← Voltar</button>
    <div>
      <div class="player-title" id="gameTitle">Carregando...</div>
      <div class="player-sys" id="gameSys"></div>
    </div>
  </div>
  <div class="player-actions">
    <button class="btn btn-secondary btn-sm" id="menuBtn">☰ Menu</button>
    <button class="btn btn-secondary btn-sm" id="fsBtn">⊞</button>
  </div>
</div>

<div id="playerWrap" style="flex:1;position:relative;background:#000">
  <div id="emulator-container" style="width:100%;height:calc(100vh - 48px);display:block;background:#000"></div>

  <!-- Botões flutuantes em fullscreen -->
  <div class="fs-btns" id="fsBtns">
    <button class="fs-btn" id="fsMenuBtn">☰</button>
    <button class="fs-btn" id="fsExitBtn">✕</button>
  </div>

  <!-- Loading screen — O ÚNICO ponto de entrada para fullscreen -->
  <div id="loadingScreen" style="position:absolute;inset:0;background:#000;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px">
    <div id="loadThumb" style="width:160px;height:213px;border-radius:12px;overflow:hidden;
      background:#111;box-shadow:0 0 60px rgba(102,192,244,0.25)"></div>
    <div style="text-align:center">
      <div id="loadTitle" style="font-family:Rajdhani,sans-serif;font-size:22px;font-weight:700;
        color:#fff;letter-spacing:2px;margin-bottom:4px"></div>
      <div id="loadSys" style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:3px;
        text-transform:uppercase;margin-bottom:16px"></div>
      <!-- Barra de progresso -->
      <div id="loadBarWrap" style="width:220px;height:2px;background:rgba(255,255,255,0.1);
        border-radius:2px;overflow:hidden;margin:0 auto 8px">
        <div id="loadBar" style="height:100%;background:#66c0f4;width:0%;transition:width 0.1s linear"></div>
      </div>
      <div id="loadStatus" style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:3px;
        text-transform:uppercase">A carregar...</div>
    </div>

  </div>

  <!-- Modal de remapeamento de controle -->
  <div class="game-menu-overlay hidden" id="remapOverlay">
    <div class="game-menu" style="min-width:340px;max-width:480px">
      <div class="game-menu-header">
        <span>🎮</span>
        <span class="title">Configurar Controle</span>
      </div>
      <div style="padding:10px 16px 0;opacity:0.7">
        <svg width="100%" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
          <path d="M75,25 Q110,10 170,20 L170,45 Q110,35 75,50 Z" fill="#1a1a1a"/>
          <path d="M325,25 Q290,10 230,20 L230,45 Q290,35 325,50 Z" fill="#1a1a1a"/>
          <path d="M50,45 Q100,22 190,32 L190,52 Q100,42 50,65 Z" fill="#333"/>
          <path d="M350,45 Q300,22 210,32 L210,52 Q300,42 350,65 Z" fill="#333"/>
          <path d="M100,40 Q200,30 300,40 Q380,50 380,130 Q380,220 310,230 Q270,235 230,190 L170,190 Q130,235 90,230 Q20,220 20,130 Q20,50 100,40 Z" fill="#0f0f0f"/>
          <circle cx="200" cy="85" r="18" fill="#fff"/>
          <path d="M194,85 L206,85 M200,79 L200,91" stroke="#000" stroke-width="2.5"/>
          <circle cx="240" cy="72" r="7" fill="#333"/>
          <circle cx="160" cy="72" r="7" fill="#333"/>
          <rect x="195" y="120" width="10" height="6" rx="2" fill="#fff"/>
          <circle cx="85" cy="110" r="25" fill="#222"/>
          <circle cx="85" cy="110" r="20" fill="#333"/>
          <g transform="translate(315, 110)">
            <circle cx="0" cy="26" r="14" fill="#008000"/>
            <circle cx="26" cy="0" r="14" fill="#e61919"/>
            <circle cx="-26" cy="0" r="14" fill="#0000cd"/>
            <circle cx="0" cy="-26" r="14" fill="#ffcc00"/>
          </g>
          <path d="M145,170 V130 M125,150 H165" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
          <circle cx="255" cy="155" r="25" fill="#222"/>
          <circle cx="255" cy="155" r="20" fill="#333"/>
        </svg>
      </div>
      <div id="remapList" style="max-height:45vh;overflow-y:auto"></div>
      <div style="display:flex;gap:8px;padding:12px 16px">
        <button class="btn btn-secondary btn-sm" id="remapReset" style="flex:1">Restaurar padrão</button>
        <button class="btn btn-primary btn-sm" id="remapClose" style="flex:1">Fechar</button>
      </div>
      <div class="game-menu-hint" id="remapHint">Clique em Remapear e pressione o botão desejado</div>
    </div>
  </div>

  <!-- Menu do jogo -->
  <div class="game-menu-overlay hidden" id="gameMenuOverlay">
    <div class="game-menu">
      <div class="game-menu-header">
        <span>🎮</span>
        <span class="title" id="menuGameTitle">—</span>
      </div>
      <div id="gameMenuItems"></div>
      <div class="game-menu-hint">↑↓ · A confirmar · B / Guide fechar</div>
    </div>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js?v=2'
import { requireAuth } from '/js/auth.js?v=2'
import { startGamepad, onGamepad, BTN, getMappings, setMapping, resetMappings } from '/js/gamepad.js?v=2'

await requireAuth()

const params     = new URLSearchParams(location.search)
const id         = params.get('id')
const joinRoomId = params.get('join')
const fromRV     = sessionStorage.getItem('rc_from_rv') === '1'

if (!id) { location.href = '/library.html'; throw 0 }

// ── Voltar ────────────────────────────────────────────────────────────────
const goBack = () => {
  try { window.EJS_emulator?.pause?.() } catch {}
  if (isFs) exitFs()
  setTimeout(doNav, 100)
}
function doNav() {
  sessionStorage.removeItem('rc_from_rv')
  location.href = fromRV ? '/retrovision.html?back=1' : '/library.html'
}
document.getElementById('backBtn').addEventListener('click', goBack)

// ── Carrega dados ─────────────────────────────────────────────────────────
let game, playInfo
try {
  ;[{ game }, playInfo] = await Promise.all([api.game(id), api.play(id)])
} catch(e) {
  document.getElementById('gameTitle').textContent = 'Erro ao carregar'
  throw e
}

document.title = `RetroCloud — ${game.nome}`
document.getElementById('gameTitle').textContent     = game.nome
document.getElementById('gameSys').textContent       = game.sistema?.toUpperCase() || ''
document.getElementById('menuGameTitle').textContent = game.nome
document.getElementById('loadTitle').textContent     = game.nome
document.getElementById('loadSys').textContent       = game.sistema?.toUpperCase() || ''
if (game.thumb) {
  document.getElementById('loadThumb').innerHTML =
    `<img src="${game.thumb}" style="width:100%;height:100%;object-fit:cover;display:block">`
}

// ── EmulatorJS ────────────────────────────────────────────────────────────
const CORES = {
  ps1:'psx', psx:'psx', snes:'snes', n64:'n64',
  gba:'gba', gbc:'gbc', gb:'gb',
  megadrive:'segaMD', genesis:'segaMD', md:'segaMD', nes:'nes',
}

// Anima barra enquanto EJS carrega
let barPct = 0
const barTimer = setInterval(() => {
  barPct = Math.min(barPct + (barPct < 70 ? 1.2 : 0.2), 92)
  const bar = document.getElementById('loadBar')
  if (bar) bar.style.width = barPct + '%'
}, 100)

const sys  = game.sistema?.toLowerCase()
const core = CORES[sys] || sys
const rom  = playInfo.emulator_url
  ? `/roms/${sys}/${playInfo.emulator_url.split('/').pop()}` : ''

// Limpa globals EJS anteriores
document.getElementById('emulatorjs-script')?.remove()
try { window.EJS_emulator?.pause?.() } catch {}
Object.keys(window).filter(k => k.startsWith('EJS_')).forEach(k => { try { delete window[k] } catch {} })

window.EJS_player          = '#emulator-container'
window.EJS_core            = core
window.EJS_gameUrl         = rom
window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/'
window.EJS_startOnLoaded   = true
window.EJS_color           = '#66c0f4'
window.EJS_backgroundColor = '#000000'
window.EJS_language        = 'en-US'
window.EJS_Buttons = {
  playPause:false, mute:false, settings:false,
  fullscreen:false, screenRecord:false, gamepad:false, cheat:false,
  volume:false, contextMenu:false,
  // habilitados para que a API (saveState/loadState/restart/netplay) funcione;
  // a barra do EJS já está oculta via CSS
  saveState:true, loadState:true, restart:true, saveSavFiles:true, netplay:true,
}

// ── Save states sincronizados com o servidor ───────────────────────────────
function ab2b64(buf) {
  const arr = new Uint8Array(buf)
  let bin = ''
  arr.forEach(b => bin += String.fromCharCode(b))
  return btoa(bin)
}
function b642ab(b64) {
  const bin = atob(b64)
  const arr = new Uint8Array(bin.length)
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i)
  return arr.buffer
}

window.EJS_onSaveState = async (e) => {
  try {
    const b64 = ab2b64(e.state)
    await api.saveState(id, b64)
  } catch (err) {
    console.warn('RetroCloud: erro ao salvar estado no servidor', err)
  }
}

window.EJS_onLoadState = async (e) => {
  try {
    const data = await api.loadState(id)
    if (data?.save_data) {
      e.load(b642ab(data.save_data))
    }
  } catch (err) {
    console.warn('RetroCloud: erro ao carregar estado do servidor', err)
  }
}

// Esconde barra EJS
const st = document.createElement('style')
st.id = 'ejs-style'
st.textContent = `
  #emulator-container .ejs_menu_bar,
  #emulator-container .ejs_volume_bar,
  #emulator-container .ejs_ctx_menu { display:none!important; }
  #emulator-container canvas { display:block!important; }
`
document.head.appendChild(st)

// ── Sessão netplay ─────────────────────────────────────────────────────────
let activeSession = null

async function toggleSession() {
  if (activeSession) {
    await api.endSession(id).catch(() => {})
    activeSession = null
  } else {
    try {
      activeSession = await api.createSession(id)
    } catch(e) { console.warn('Erro ao criar sessão', e) }
  }
  renderMenu()
}

window.addEventListener('pagehide', () => { if (activeSession) api.endSession(id) })

// Auto-join netplay se veio com ?join=ROOM_ID
async function autoJoinNetplay(roomId) {
  await new Promise(r => setTimeout(r, 2000))
  const emu = window.EJS_emulator
  if (!emu) return
  try {
    // Tenta API direta do EJS
    if (typeof emu.netplay?.joinRoom === 'function') { emu.netplay.joinRoom(roomId); return }
    if (typeof emu.joinRoom === 'function')           { emu.joinRoom(roomId); return }
  } catch(e) {}
  // Abre modal e preenche automaticamente
  emu.openNetplay?.()
  await new Promise(r => setTimeout(r, 700))
  const inputs = [...document.querySelectorAll('input[type="text"],input:not([type])')]
  const roomInput = inputs.find(el => !el.value && el.offsetParent)
  if (roomInput) {
    roomInput.value = roomId
    roomInput.dispatchEvent(new Event('input', { bubbles: true }))
    roomInput.dispatchEvent(new Event('change', { bubbles: true }))
    await new Promise(r => setTimeout(r, 300))
    const btns = [...document.querySelectorAll('button')]
    const joinBtn = btns.find(b => /join|entrar|juntar/i.test(b.textContent) && b.offsetParent)
      || btns.filter(b => b.offsetParent).at(-1)
    joinBtn?.click()
  }
}

// Esconde loading quando jogo inicia e entra em fullscreen
function hideLoading() {
  clearInterval(barTimer)
  const scr = document.getElementById('loadingScreen')
  if (!scr || scr.style.display === 'none') return
  const bar = document.getElementById('loadBar')
  if (bar) bar.style.width = '100%'
  setTimeout(() => {
    scr.style.opacity = '0'
    scr.style.transition = 'opacity 0.5s'
    setTimeout(() => { scr.style.display = 'none' }, 500)
    window.dispatchEvent(new Event('resize'))

    // Entra em fullscreen CSS — não usa API nativa, EJS não pode interferir
    enterFs()
  }, 800)
}

window.EJS_onGameStart = () => {
  hideLoading()
  if (joinRoomId) autoJoinNetplay(joinRoomId)
}
setTimeout(hideLoading, 15000)
const script = document.createElement('script')
script.id  = 'emulatorjs-script'
script.src = `https://cdn.emulatorjs.org/stable/data/loader.js?v=${Date.now()}`
document.body.appendChild(script)



// ── Fullscreen via CSS (não usa browser Fullscreen API — evita conflito com EJS) ──
let isFs = false

const playerBar = document.getElementById('playerBar')
const fsBtns    = document.getElementById('fsBtns')
let fsTimer

function showFsBtns() {
  fsBtns.classList.add('visible')
  clearTimeout(fsTimer)
  fsTimer = setTimeout(() => fsBtns.classList.remove('visible'), 3000)
}

function enterFs() {
  const wrap = document.getElementById('playerWrap')
  wrap.style.cssText = 'position:fixed;inset:0;z-index:9998;background:#000;flex:1'
  document.getElementById('emulator-container').style.height = '100vh'
  playerBar.style.display = 'none'
  isFs = true
  showFsBtns()
  window.dispatchEvent(new Event('resize'))
}

function exitFs() {
  const wrap = document.getElementById('playerWrap')
  wrap.style.cssText = 'flex:1;position:relative;background:#000'
  document.getElementById('emulator-container').style.height = 'calc(100vh - 48px)'
  playerBar.style.display = ''
  isFs = false
  fsBtns.classList.remove('visible')
  window.dispatchEvent(new Event('resize'))
}

function toggleFs() {
  isFs ? exitFs() : enterFs()
}

document.getElementById('fsBtn').addEventListener('click', toggleFs)
document.getElementById('fsMenuBtn').addEventListener('click', openMenu)
document.getElementById('fsExitBtn').addEventListener('click', toggleFs)
document.getElementById('playerWrap').addEventListener('mousemove', () => {
  if (isFs) showFsBtns()
})

// ── Menu ──────────────────────────────────────────────────────────────────
function getMenuItems() {
  return [
    { icon:'▶', label:'Continuar',         action: closeMenu },
    { icon:'⊞', label:'Tela cheia',        action: () => { closeMenu(); toggleFs() } },
    { icon:'💾', label:'Salvar estado',     action: () => { window.EJS_emulator?.saveState?.(); closeMenu() } },
    { icon:'📂', label:'Carregar estado',   action: () => { window.EJS_emulator?.loadState?.(); closeMenu() } },
    { icon: activeSession ? '🔴' : '🌐',
      label: activeSession ? 'Encerrar sessão' : 'Criar sessão',
      action: () => { toggleSession() }
    },
    { icon:'🎮', label:'Configurar controle',  action: () => { closeMenu(); openRemap() } },
    { icon:'🔄', label:'Reiniciar',         action: () => { window.EJS_emulator?.restart?.(); closeMenu() } },
    { icon:'←',  label:'Sair do jogo',     action: goBack },
  ]
}

let selectedItem = 0
const menuOverlay = document.getElementById('gameMenuOverlay')
const itemsEl     = document.getElementById('gameMenuItems')

function renderMenu() {
  const items = getMenuItems()
  itemsEl.innerHTML = items.map((item, i) =>
    `<button class="game-menu-item${i===selectedItem?' selected':''}" data-idx="${i}">
      <span>${item.icon}</span><span>${item.label}</span>
    </button>`
  ).join('')
  itemsEl.querySelectorAll('.game-menu-item').forEach(b => {
    b.addEventListener('click', () => getMenuItems()[+b.dataset.idx]?.action())
    b.addEventListener('mouseover', () => selectMenuItem(+b.dataset.idx))
  })
}

function selectMenuItem(i) {
  selectedItem = i
  itemsEl.querySelectorAll('.game-menu-item').forEach((b, idx) =>
    b.classList.toggle('selected', idx === i))
}
function openMenu()  { selectedItem = 0; renderMenu(); menuOverlay.classList.remove('hidden') }
function closeMenu() { menuOverlay.classList.add('hidden') }

document.getElementById('menuBtn').addEventListener('click', openMenu)

document.addEventListener('keydown', e => {
  if (!menuOverlay.classList.contains('hidden')) {
    if (e.key === 'ArrowUp')   selectMenuItem(Math.max(0, selectedItem-1))
    if (e.key === 'ArrowDown') selectMenuItem(Math.min(getMenuItems().length-1, selectedItem+1))
    if (e.key === 'Enter')     getMenuItems()[selectedItem]?.action()
    if (e.key === 'Escape')    closeMenu()
  }
})

// ── Gamepad ───────────────────────────────────────────────────────────────
// ── Remapeamento de controle ───────────────────────────────────────────────
const REMAP_ACTIONS = [
  { name:'Guide (Menu)',  btn: BTN.GUIDE  },
  { name:'A (Confirmar)',  btn: BTN.A      },
  { name:'B (Voltar)',     btn: BTN.B      },
  { name:'X',              btn: BTN.X      },
  { name:'Y',              btn: BTN.Y      },
  { name:'Cima',           btn: BTN.UP     },
  { name:'Baixo',          btn: BTN.DOWN   },
  { name:'Esquerda',       btn: BTN.LEFT   },
  { name:'Direita',        btn: BTN.RIGHT  },
  { name:'LB',             btn: BTN.LB     },
  { name:'RB',             btn: BTN.RB     },
  { name:'LT',             btn: BTN.LT     },
  { name:'RT',             btn: BTN.RT     },
  { name:'Start',          btn: BTN.START  },
  { name:'Select',         btn: BTN.SELECT },
]

const BTN_NAMES = {
  [BTN.A]:'A', [BTN.B]:'B', [BTN.X]:'X', [BTN.Y]:'Y',
  [BTN.LB]:'LB', [BTN.RB]:'RB', [BTN.LT]:'LT', [BTN.RT]:'RT',
  [BTN.SELECT]:'Select', [BTN.START]:'Start',
  [BTN.L3]:'L3', [BTN.R3]:'R3',
  [BTN.UP]:'Cima', [BTN.DOWN]:'Baixo', [BTN.LEFT]:'Esq', [BTN.RIGHT]:'Dir',
  [BTN.GUIDE]:'Guide',
}

const remapOverlay = document.getElementById('remapOverlay')
let listeningFor = null
let rawGamepadListener = null
let remapSel = 0

function renderRemapList() {
  const map = getMappings()
  const inv = {}
  Object.entries(map).forEach(([phys, virt]) => { inv[virt] = +phys })

  const list = document.getElementById('remapList')
  list.innerHTML = REMAP_ACTIONS.map((a, i) => {
    const physBtn = inv[a.btn] !== undefined ? inv[a.btn] : a.btn
    const label   = BTN_NAMES[physBtn] !== undefined ? BTN_NAMES[physBtn] : `Btn ${physBtn}`
    const sel     = i === remapSel
    return `<div class="game-menu-item${sel ? ' selected' : ''}" style="justify-content:space-between;padding:10px 16px" data-idx="${i}">
      <span>${a.name}</span>
      <button class="btn btn-secondary btn-sm remap-btn" data-virtual="${a.btn}" data-idx="${i}"
        style="min-width:80px;font-size:11px${sel ? ';outline:2px solid #66c0f4' : ''}">${label}</button>
    </div>`
  }).join('')

  list.querySelectorAll('.remap-btn').forEach(b => {
    b.addEventListener('click', () => { remapSel = +b.dataset.idx; startListening(+b.dataset.virtual, b) })
  })
  list.querySelectorAll('.game-menu-item').forEach(b => {
    b.addEventListener('mouseover', () => { remapSel = +b.dataset.idx; renderRemapList() })
  })
}

function selectRemapItem(i) {
  remapSel = Math.max(0, Math.min(REMAP_ACTIONS.length - 1, i))
  renderRemapList()
  document.querySelector(`#remapList .game-menu-item[data-idx="${remapSel}"]`)?.scrollIntoView({ block: 'nearest' })
}

function startListening(virtualBtn, buttonEl) {
  if (listeningFor !== null) stopListening()
  listeningFor = virtualBtn
  buttonEl.textContent = '...'
  buttonEl.style.background = '#66c0f4'
  buttonEl.style.color = '#000'
  document.getElementById('remapHint').textContent = 'Pressione um botão no controle...'

  // Aguarda soltar todos os botões antes de capturar (evita capturar o botão que abriu o modal)
  let waitRelease = true
  rawGamepadListener = setInterval(() => {
    const gps = navigator.getGamepads?.() || []
    const anyPressed = [...gps].some(gp => gp?.buttons.some(b => b.pressed))
    if (waitRelease) { if (!anyPressed) waitRelease = false; return }
    for (const gp of gps) {
      if (!gp) continue
      gp.buttons.forEach((btn, i) => {
        if (btn.pressed && listeningFor !== null) {
          setMapping(i, listeningFor)
          stopListening()
          renderRemapList()
        }
      })
    }
  }, 50)
}

function stopListening() {
  if (rawGamepadListener) { clearInterval(rawGamepadListener); rawGamepadListener = null }
  listeningFor = null
  document.getElementById('remapHint').textContent = 'Clique em Remapear e pressione o botão desejado'
}

function openRemap() {
  remapSel = 0
  renderRemapList()
  remapOverlay.classList.remove('hidden')
}
function closeRemap() {
  stopListening()
  remapOverlay.classList.add('hidden')
}

document.getElementById('remapClose').addEventListener('click', closeRemap)
document.getElementById('remapReset').addEventListener('click', () => {
  resetMappings()
  renderRemapList()
})

// ── Gamepad ───────────────────────────────────────────────────────────────
startGamepad()
onGamepad((btn, type) => {
  if (type !== 'press') return
  if (!remapOverlay.classList.contains('hidden')) {
    if (listeningFor !== null) {
      if (btn === BTN.B || btn === BTN.GUIDE) stopListening()
    } else {
      if (btn === BTN.UP)   selectRemapItem(remapSel - 1)
      if (btn === BTN.DOWN) selectRemapItem(remapSel + 1)
      if (btn === BTN.A) {
        const a = REMAP_ACTIONS[remapSel]
        if (a) {
          const el = document.querySelector(`#remapList .remap-btn[data-idx="${remapSel}"]`)
          startListening(a.btn, el)
        }
      }
      if (btn === BTN.B || btn === BTN.GUIDE) closeRemap()
    }
    return
  }
  if (!menuOverlay.classList.contains('hidden')) {
    if (btn === BTN.UP)                     selectMenuItem(Math.max(0, selectedItem-1))
    if (btn === BTN.DOWN)                   selectMenuItem(Math.min(getMenuItems().length-1, selectedItem+1))
    if (btn === BTN.A)                      getMenuItems()[selectedItem]?.action()
    if (btn === BTN.B || btn === BTN.GUIDE) closeMenu()
  } else {
    if (btn === BTN.GUIDE) openMenu()
  }
})
</script>
</body>
</html>
