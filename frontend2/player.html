<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroCloud — Jogando</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="margin:0;background:#000;display:flex;flex-direction:column;min-height:100vh">

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <button class="btn btn-secondary btn-sm" id="backBtn">← Voltar</button>
    <div>
      <div class="player-title" id="gameTitle">Carregando...</div>
      <div class="player-sys" id="gameSys"></div>
    </div>
  </div>
  <div class="player-actions">
    <button class="btn btn-secondary btn-sm" id="menuBtn">☰ Menu</button>
    <button class="btn btn-secondary btn-sm" id="fsBtn">⊞</button>
  </div>
</div>

<div id="playerWrap" style="flex:1;position:relative;background:#000">
  <div id="emulator-container" style="width:100%;height:calc(100vh - 48px);min-height:400px;display:block;background:#000"></div>

  <!-- Tela de loading -->
  <div id="loadingScreen" style="
    position:absolute;inset:0;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    z-index:10;transition:opacity 0.5s ease">
    <div id="loadThumb" style="width:180px;height:240px;border-radius:14px;overflow:hidden;background:#111;
      box-shadow:0 0 60px rgba(102,192,244,0.3)"></div>
    <div style="text-align:center">
      <div id="loadTitle" style="font-family:Rajdhani,sans-serif;font-size:24px;font-weight:700;
        color:#fff;letter-spacing:2px;margin-bottom:6px"></div>
      <div id="loadSys" style="font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:3px;
        text-transform:uppercase;margin-bottom:20px"></div>
      <div style="width:240px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden">
        <div id="loadBar" style="height:100%;background:#66c0f4;border-radius:2px;
          width:0%;transition:width 0.1s linear"></div>
      </div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:4px;
        text-transform:uppercase;margin-top:10px">A carregar...</div>
    </div>
  </div>

  <!-- Botões fullscreen -->
  <div class="fs-btns" id="fsBtns">
    <button class="fs-btn" id="fsMenuBtn">☰</button>
    <button class="fs-btn" id="fsExitBtn">✕</button>
  </div>

  <!-- Menu do jogo -->
  <div class="game-menu-overlay hidden" id="gameMenuOverlay">
    <div class="game-menu">
      <div class="game-menu-header">
        <span>🎮</span>
        <span class="title" id="menuGameTitle">—</span>
      </div>
      <div id="gameMenuItems"></div>
      <div class="game-menu-hint">↑↓ · A confirmar · B / Guide fechar</div>
    </div>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js'
import { requireAuth } from '/js/auth.js'
import { startGamepad, onGamepad, BTN } from '/js/gamepad.js'

await requireAuth()

const params  = new URLSearchParams(location.search)
const id      = params.get('id')
const fromRV  = sessionStorage.getItem('rc_from_rv') === '1'

if (!id) { location.href = '/library.html'; throw 0 }

// Volta
const goBack = () => {
  try { window.EJS_emulator?.pause?.() } catch {}
  if (document.fullscreenElement) document.exitFullscreen?.()
  sessionStorage.removeItem('rc_from_rv')
  const dest = fromRV ? '/retrovision.html?back=1' : '/library.html'
  setTimeout(() => { location.href = dest }, 100)
}
document.getElementById('backBtn').addEventListener('click', goBack)

// Carrega dados
let game, playInfo
try {
  ;[{ game }, playInfo] = await Promise.all([api.game(id), api.play(id)])
} catch(e) {
  document.getElementById('gameTitle').textContent = 'Erro ao carregar'
  throw e
}

document.title = `RetroCloud — ${game.nome}`
document.getElementById('gameTitle').textContent     = game.nome
document.getElementById('gameSys').textContent       = game.sistema?.toUpperCase() || ''
document.getElementById('menuGameTitle').textContent = game.nome

// Preenche loading screen
document.getElementById('loadTitle').textContent = game.nome
document.getElementById('loadSys').textContent   = game.sistema?.toUpperCase() || ''
if (game.thumb) {
  document.getElementById('loadThumb').innerHTML =
    `<img src="${game.thumb}" style="width:100%;height:100%;object-fit:cover">`
}

// EmulatorJS
const CORES = {
  ps1:'psx', psx:'psx', snes:'snes', n64:'n64',
  gba:'gba', gbc:'gbc', gb:'gb',
  megadrive:'segaMD', genesis:'segaMD', md:'segaMD', nes:'nes',
}

let ejsLoaded = false
function initEJS() {
  if (ejsLoaded) return
  const sys  = game.sistema?.toLowerCase()
  const core = CORES[sys] || sys
  const rom  = playInfo.emulator_url
    ? `/roms/${sys}/${playInfo.emulator_url.split('/').pop()}` : ''

  // Limpa instância anterior
  document.getElementById('emulatorjs-script')?.remove()
  document.getElementById('ejs-style')?.remove()
  try { window.EJS_emulator?.pause?.() } catch {}
  Object.keys(window).filter(k => k.startsWith('EJS_')).forEach(k => { try { delete window[k] } catch {} })

  // Verifica container
  const el = document.getElementById('emulator-container')
  if (!el || el.offsetWidth === 0) { setTimeout(initEJS, 100); return }

  ejsLoaded = true

  window.EJS_player          = '#emulator-container'
  window.EJS_core            = core
  window.EJS_gameUrl         = rom
  window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/'
  window.EJS_startOnLoaded   = true
  window.EJS_color           = '#66c0f4'
  window.EJS_backgroundColor = '#000000'
  window.EJS_language        = 'en-US'
  window.EJS_Buttons = {
    playPause:false, restart:false, mute:false, settings:false,
    fullscreen:false, saveState:false, loadState:false,
    screenRecord:false, gamepad:false, cheat:false,
    volume:false, saveSavFiles:true, contextMenu:false,
  }

  const st = document.createElement('style')
  st.id = 'ejs-style'
  st.textContent = `
    #emulator-container .ejs_menu_bar,
    #emulator-container .ejs_volume_bar,
    #emulator-container .ejs_ctx_menu { display:none!important; }
    #emulator-container canvas { display:block!important; }
  `
  document.head.appendChild(st)

  // Callback quando jogo começa — esconde loading screen e entra em fullscreen
  window.EJS_onGameStart = () => {
    clearInterval(window._rcBarTimer)
    const bar = document.getElementById('loadBar')
    const scr = document.getElementById('loadingScreen')
    if (bar) bar.style.width = '100%'
    setTimeout(() => {
      if (scr) {
        scr.style.opacity = '0'
        setTimeout(() => { if (scr) scr.style.display = 'none' }, 500)
      }
      window.dispatchEvent(new Event('resize'))
      // Fullscreen automático — EJS_onGameStart é disparado dentro de um gesture
      if (!document.fullscreenElement) {
        document.getElementById('playerWrap')?.requestFullscreen?.().catch(() => {})
      }
    }, 300)
  }

  const script = document.createElement('script')
  script.id  = 'emulatorjs-script'
  script.src = `https://cdn.emulatorjs.org/stable/data/loader.js?v=${Date.now()}`
  document.body.appendChild(script)
}

// Anima barra de loading
let _barPct = 0
window._rcBarTimer = setInterval(() => {
  _barPct = Math.min(_barPct + (_barPct < 70 ? 1.5 : 0.3), 95)
  const bar = document.getElementById('loadBar')
  if (bar) bar.style.width = _barPct + '%'
}, 80)

setTimeout(initEJS, 200)

// Fullscreen
let isFs = false
const bar    = document.getElementById('playerBar')
const fsBtns = document.getElementById('fsBtns')
let fsTimer

function showFsBtns() {
  fsBtns.classList.add('visible')
  clearTimeout(fsTimer)
  fsTimer = setTimeout(() => fsBtns.classList.remove('visible'), 3000)
}

function toggleFs() {
  if (!document.fullscreenElement) {
    document.getElementById('playerWrap').requestFullscreen?.().catch(() => {})
  } else {
    document.exitFullscreen?.()
  }
}
document.addEventListener('fullscreenchange', () => {
  isFs = !!document.fullscreenElement
  bar.style.display = isFs ? 'none' : ''
  document.getElementById('emulator-container').style.height = isFs ? '100vh' : 'calc(100vh - 48px)'
  if (isFs) showFsBtns()
})
document.getElementById('fsBtn').addEventListener('click', toggleFs)
document.getElementById('fsBtns').addEventListener('mousemove', showFsBtns)
document.getElementById('fsBtns').addEventListener('touchstart', showFsBtns)
document.getElementById('playerWrap').addEventListener('mousemove', () => { if (isFs) showFsBtns() })

// Entra em fullscreen quando EJS iniciar o jogo (dentro do EJS_onGameStart que é disparado pelo user gesture)
// Se veio de RetroVision, tenta fullscreen ao carregar
const wantFs = sessionStorage.getItem('rc_want_fs') === '1'
sessionStorage.removeItem('rc_want_fs')
if (wantFs) {
  // Listener para primeiro clique/touch do usuário
  const fsOnGesture = () => {
    toggleFs()
    document.removeEventListener('click', fsOnGesture)
    document.removeEventListener('touchstart', fsOnGesture)
    document.removeEventListener('keydown', fsOnGesture)
  }
  document.addEventListener('click', fsOnGesture, { once: true })
  document.addEventListener('touchstart', fsOnGesture, { once: true })
  document.addEventListener('keydown', fsOnGesture, { once: true })
}

// Menu
const MENU_ITEMS = [
  { icon:'▶', label:'Continuar',          action: closeMenu },
  { icon:'⊞', label:'Tela cheia',         action: toggleFs },
  { icon:'💾', label:'Salvar estado',      action: () => { window.EJS_emulator?.saveState?.(); closeMenu() } },
  { icon:'📂', label:'Carregar estado',    action: () => { window.EJS_emulator?.loadState?.(); closeMenu() } },
  { icon:'🔄', label:'Reiniciar',          action: () => { window.EJS_emulator?.restart?.(); closeMenu() } },
  { icon:'🎮', label:'Mapear controle',    action: () => { closeMenu(); openMapping() } },
  { icon:'←',  label:'Sair do jogo',      action: goBack },
]

let selectedItem = 0
const overlay = document.getElementById('gameMenuOverlay')
const itemsEl = document.getElementById('gameMenuItems')

itemsEl.innerHTML = MENU_ITEMS.map((item, i) =>
  `<button class="game-menu-item${i===0?' selected':''}" data-idx="${i}">
    <span>${item.icon}</span><span>${item.label}</span>
  </button>`
).join('')

itemsEl.addEventListener('click', e => {
  const btn = e.target.closest('.game-menu-item')
  if (btn) { MENU_ITEMS[+btn.dataset.idx]?.action() }
})
itemsEl.addEventListener('mouseover', e => {
  const btn = e.target.closest('.game-menu-item')
  if (btn) selectMenuItem(+btn.dataset.idx)
})

function selectMenuItem(i) {
  selectedItem = i
  itemsEl.querySelectorAll('.game-menu-item').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i)
  })
}

function openMenu()  { overlay.classList.remove('hidden'); selectMenuItem(0) }

// ── Mapeamento de controle ────────────────────────────────────────────────
function openMapping() {
  const gp = [...(navigator.getGamepads?.() || [])].find(Boolean)
  const overlay = document.createElement('div')
  overlay.id = 'mappingOverlay'
  overlay.style.cssText = 'position:absolute;inset:0;z-index:600;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)'

  const BUTTONS = [
    { id:12, label:'↑', pos:[160,90] }, { id:13, label:'↓', pos:[160,150] },
    { id:14, label:'←', pos:[100,120] }, { id:15, label:'→', pos:[220,120] },
    { id:0,  label:'A', pos:[420,130], color:'#4caf50' },
    { id:1,  label:'B', pos:[460,165], color:'#f44336' },
    { id:2,  label:'X', pos:[380,165], color:'#2196f3' },
    { id:3,  label:'Y', pos:[420,200], color:'#ff9800' },
    { id:4,  label:'LB', pos:[60,40] }, { id:5,  label:'RB', pos:[450,40] },
    { id:8,  label:'SEL', pos:[180,250] }, { id:9, label:'STA', pos:[280,250] },
    { id:16, label:'Guide', pos:[230,220], color:'#66c0f4' },
  ]

  const AXES = [
    { id:'ax0', label:'L←→', cx:130, cy:200 },
    { id:'ax1', label:'L↑↓', cx:130, cy:200 },
    { id:'ax2', label:'R←→', cx:340, cy:200 },
    { id:'ax3', label:'R↑↓', cx:340, cy:200 },
  ]

  let listening = null
  let animId = null

  function btnColor(id) {
    const gp2 = [...(navigator.getGamepads?.() || [])].find(Boolean)
    if (!gp2) return ''
    return gp2.buttons[id]?.pressed ? 'background:rgba(255,255,255,0.3);' : ''
  }

  function renderSVG() {
    const gp2 = [...(navigator.getGamepads?.() || [])].find(Boolean)
    return `<svg width="560" height="300" style="overflow:visible">
      <!-- Corpo do controle -->
      <ellipse cx="280" cy="170" rx="200" ry="110" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
      <ellipse cx="180" cy="190" rx="60" ry="60" fill="#111" stroke="#333"/>
      <ellipse cx="350" cy="210" rx="45" ry="45" fill="#111" stroke="#333"/>
      <!-- Gatilhos -->
      <path d="M100,60 Q80,30 110,20 L180,30 Q160,50 140,60Z" fill="#222" stroke="#444"/>
      <path d="M460,60 Q480,30 450,20 L380,30 Q400,50 420,60Z" fill="#222" stroke="#444"/>
      ${BUTTONS.map(b => {
        const pressed = gp2?.buttons[b.id]?.pressed
        const col = pressed ? (b.color||'#fff') : '#555'
        const bg = pressed ? 'rgba(255,255,255,0.15)' : 'transparent'
        return `<g style="cursor:pointer" onclick="startListen(${b.id})">
          <circle cx="${b.pos[0]}" cy="${b.pos[1]}" r="16" fill="${bg}" stroke="${col}" stroke-width="${listening===b.id?3:1.5}"/>
          <text x="${b.pos[0]}" y="${b.pos[1]+5}" text-anchor="middle" fill="${col}" font-size="11" font-weight="700">${b.label}</text>
        </g>`
      }).join('')}
      <!-- Analógicos -->
      <circle cx="130" cy="190" r="28" fill="#333" stroke="#555"/>
      ${gp2 ? `<circle cx="${130+(gp2.axes[0]||0)*20}" cy="${190+(gp2.axes[1]||0)*20}" r="10" fill="#66c0f4"/>` : '<circle cx="130" cy="190" r="10" fill="#444"/>'}
      <circle cx="350" cy="210" r="22" fill="#333" stroke="#555"/>
      ${gp2 ? `<circle cx="${350+(gp2.axes[2]||0)*16}" cy="${210+(gp2.axes[3]||0)*16}" r="8" fill="#66c0f4"/>` : '<circle cx="350" cy="210" r="8" fill="#444"/>'}
    </svg>`
  }

  function render() {
    const content = overlay.querySelector('#mappingContent')
    if (!content) return
    content.querySelector('#controllerSVG').innerHTML = renderSVG()
    if (listening !== null) {
      content.querySelector('#listenMsg').textContent = `Pressione o botão para mapear como "${BUTTONS.find(b=>b.id===listening)?.label}"...`
    } else {
      content.querySelector('#listenMsg').textContent = 'Clique em um botão para remapear'
    }
  }

  overlay.innerHTML = `<div id="mappingContent" style="text-align:center;color:#fff;max-width:600px;width:100%;padding:20px">
    <div style="font-family:Rajdhani,sans-serif;font-size:24px;font-weight:700;margin-bottom:8px;color:#66c0f4">🎮 Mapeamento de Controle</div>
    <div id="listenMsg" style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px">Clique em um botão para remapear</div>
    <div id="controllerSVG">${renderSVG()}</div>
    <div style="margin-top:16px;display:flex;gap:12px;justify-content:center">
      <button onclick="document.getElementById('mappingOverlay').remove();cancelAnimationFrame(window._mapAnimId)"
        style="background:#333;color:#fff;border:1px solid #555;border-radius:8px;padding:8px 24px;cursor:pointer">Fechar</button>
      <button onclick="if(window.EJS_emulator?.openGamepadConfig)window.EJS_emulator.openGamepadConfig();else alert('Use as configurações do EmulatorJS para mapeamento avançado')"
        style="background:#66c0f4;color:#000;border:none;border-radius:8px;padding:8px 24px;font-weight:700;cursor:pointer">Config EmulatorJS</button>
    </div>
  </div>`

  document.getElementById('playerWrap').appendChild(overlay)

  // Poll para mostrar estado dos botões em tempo real
  window._mapAnimId = requestAnimationFrame(function loop() {
    if (!document.getElementById('mappingOverlay')) return
    render()
    window._mapAnimId = requestAnimationFrame(loop)
  })
}

function closeMenu() { overlay.classList.add('hidden') }

document.getElementById('menuBtn').addEventListener('click', openMenu)
document.getElementById('fsMenuBtn').addEventListener('click', openMenu)
document.getElementById('fsExitBtn').addEventListener('click', toggleFs)

document.addEventListener('keydown', e => {
  if (!overlay.classList.contains('hidden')) {
    if (e.key === 'ArrowUp')    selectMenuItem(Math.max(0, selectedItem-1))
    if (e.key === 'ArrowDown')  selectMenuItem(Math.min(MENU_ITEMS.length-1, selectedItem+1))
    if (e.key === 'Enter')      MENU_ITEMS[selectedItem]?.action()
    if (e.key === 'Escape')     closeMenu()
  }
})

// Gamepad
startGamepad()
onGamepad((btn, type) => {
  if (type !== 'press') return

  if (!overlay.classList.contains('hidden')) {
    // Menu aberto
    if (btn === BTN.UP)    selectMenuItem(Math.max(0, selectedItem-1))
    if (btn === BTN.DOWN)  selectMenuItem(Math.min(MENU_ITEMS.length-1, selectedItem+1))
    if (btn === BTN.A)     MENU_ITEMS[selectedItem]?.action()
    if (btn === BTN.B || btn === BTN.GUIDE) closeMenu()
  } else {
    // Jogo rodando — só Guide abre menu
    if (btn === BTN.GUIDE) openMenu()
  }
})
</script>
</body>
</html>
