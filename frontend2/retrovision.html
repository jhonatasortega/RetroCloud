<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroCloud — RetroVision</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="margin:0;overflow:hidden">

<!-- Intro -->
<div id="rvIntro" class="rv-intro">
  <div class="rv-intro-content">
    <div class="rv-intro-logo">🎮</div>
    <div class="rv-intro-title">RetroCloud</div>
    <div class="rv-intro-line"></div>
    <div class="rv-intro-sub">RetroVision</div>
  </div>
</div>

<div id="retrovision" class="hidden">
  <!-- Fundo -->
  <div class="rv-bg" id="rvBg"></div>

  <!-- Sistemas -->
  <div class="rv-systems" id="rvSystems"></div>

  <!-- Carrossel -->
  <div class="rv-carousel" id="rvCarousel">
    <div class="rv-cards-wrap" id="rvCards"></div>
  </div>

  <!-- Info rodapé -->
  <div class="rv-info" id="rvInfo">
    <div class="rv-game-title" id="rvTitle">—</div>
    <div class="rv-game-sub" id="rvSub"></div>
    <div style="display:flex;gap:12px;align-items:center;justify-content:center">
      <button class="rv-play-btn" id="rvPlayBtn">▶ Jogar</button>
      <button class="rv-play-btn" id="rvJoinBtn" style="display:none">🌐 Jogar junto</button>
    </div>
    <div class="rv-hint" id="rvHint">◀▶ navegar · A jogar · Guide menu · B sair</div>
  </div>

  <!-- Menu Guide -->
  <div class="rv-menu-overlay hidden" id="rvMenuOverlay">
    <div class="rv-menu">
      <div class="rv-menu-header"><div class="rv-menu-title">RetroVision</div></div>
      <div id="rvMenuItems"></div>
      <div class="rv-menu-hint">A confirmar · B fechar</div>
    </div>
  </div>

  <!-- Modal de remapeamento de controle -->
  <div class="rv-menu-overlay hidden" id="rvRemapOverlay">
    <div class="rv-menu" style="min-width:340px;max-width:480px">
      <div class="rv-menu-header"><div class="rv-menu-title">Configurar Controle</div></div>
      <div style="padding:8px 16px 0;opacity:0.7">
        <svg width="100%" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
          <path d="M75,25 Q110,10 170,20 L170,45 Q110,35 75,50 Z" fill="#1a1a1a"/>
          <path d="M325,25 Q290,10 230,20 L230,45 Q290,35 325,50 Z" fill="#1a1a1a"/>
          <path d="M50,45 Q100,22 190,32 L190,52 Q100,42 50,65 Z" fill="#333"/>
          <path d="M350,45 Q300,22 210,32 L210,52 Q300,42 350,65 Z" fill="#333"/>
          <path d="M100,40 Q200,30 300,40 Q380,50 380,130 Q380,220 310,230 Q270,235 230,190 L170,190 Q130,235 90,230 Q20,220 20,130 Q20,50 100,40 Z" fill="#0f0f0f"/>
          <circle cx="200" cy="85" r="18" fill="#fff"/>
          <path d="M194,85 L206,85 M200,79 L200,91" stroke="#000" stroke-width="2.5"/>
          <circle cx="240" cy="72" r="7" fill="#333"/>
          <circle cx="160" cy="72" r="7" fill="#333"/>
          <rect x="195" y="120" width="10" height="6" rx="2" fill="#fff"/>
          <circle cx="85" cy="110" r="25" fill="#222"/>
          <circle cx="85" cy="110" r="20" fill="#333"/>
          <g transform="translate(315, 110)">
            <circle cx="0" cy="26" r="14" fill="#008000"/>
            <circle cx="26" cy="0" r="14" fill="#e61919"/>
            <circle cx="-26" cy="0" r="14" fill="#0000cd"/>
            <circle cx="0" cy="-26" r="14" fill="#ffcc00"/>
          </g>
          <path d="M145,170 V130 M125,150 H165" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round"/>
          <circle cx="255" cy="155" r="25" fill="#222"/>
          <circle cx="255" cy="155" r="20" fill="#333"/>
        </svg>
      </div>
      <div id="rvRemapList" style="max-height:40vh;overflow-y:auto"></div>
      <div style="display:flex;gap:8px;padding:12px 16px">
        <button class="btn btn-secondary btn-sm" id="rvRemapReset" style="flex:1">Restaurar padrão</button>
        <button class="btn btn-primary btn-sm" id="rvRemapClose" style="flex:1">Fechar</button>
      </div>
      <div class="rv-menu-hint" id="rvRemapHint">Clique em Remapear e pressione o botão desejado</div>
    </div>
  </div>

  <!-- Confirmação saída (não-TV) -->
  <div class="rv-confirm hidden" id="rvConfirm">
    <div class="rv-confirm-box" id="rvConfirmBox">
      <div class="rv-confirm-title">Sair do RetroVision?</div>
      <div class="rv-confirm-sub">A confirmar · B / X cancelar</div>
      <div class="rv-confirm-btns">
        <button class="rv-play-btn" id="rvConfirmYes">Sair</button>
        <button class="btn btn-secondary" id="rvConfirmNo">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { api } from '/js/api.js'
import { requireAuth, logout } from '/js/auth.js'
import { startGamepad, onGamepad, BTN, hasGamepad, getMappings, setMapping, resetMappings } from '/js/gamepad.js'

const user = await requireAuth()
if (!user) throw 0

// Detecta TV: controle sem mouse fino
const isTVMode = () => {
  const gp = hasGamepad()
  const noMouse = !window.matchMedia('(pointer: fine)').matches
  return gp && noMouse
}
const tvMode = isTVMode()

// Se veio de volta do jogo (?back=1), não mostra intro
const isBack = new URLSearchParams(location.search).get('back') === '1'

const SYS_META = {
  snes:      { label:'Super Nintendo',  color:'#7c3aed', glow:'#a855f7', logo:'/img/systems/snes.svg' },
  n64:       { label:'Nintendo 64',     color:'#dc2626', glow:'#ef4444', logo:'/img/systems/n64.svg' },
  ps1:       { label:'PlayStation',     color:'#1d4ed8', glow:'#3b82f6', logo:'/img/systems/ps1.svg' },
  psx:       { label:'PlayStation',     color:'#1d4ed8', glow:'#3b82f6', logo:'/img/systems/ps1.svg' },
  megadrive: { label:'Mega Drive',      color:'#0f766e', glow:'#14b8a6', logo:'/img/systems/megadrive.svg' },
  genesis:   { label:'Mega Drive',      color:'#0f766e', glow:'#14b8a6', logo:'/img/systems/megadrive.svg' },
  md:        { label:'Mega Drive',      color:'#0f766e', glow:'#14b8a6', logo:'/img/systems/megadrive.svg' },
  gba:       { label:'Game Boy Advance',color:'#b45309', glow:'#f59e0b', logo:'/img/systems/gba.svg' },
  gbc:       { label:'Game Boy Color',  color:'#15803d', glow:'#22c55e', logo:'/img/systems/gbc.svg' },
  gb:        { label:'Game Boy',        color:'#374151', glow:'#9ca3af', logo:'/img/systems/gb.svg' },
  nes:       { label:'NES',             color:'#9f1239', glow:'#f43f5e', logo:'/img/systems/nes.svg' },
}
const DEF_META = { label:'Outros', color:'#4b5563', glow:'#9ca3af', logo:null }

const RANGE = 3
const PAGE  = 20
let allGames = [], systems = [], sysIdx = 0, gameIdx = 0
let menuOpen = false, confirmOpen = false, confirmSel = 0
let menuSel = 0
let navStart = 0
let navPaged = false

// Carrega jogos e sessões ativas
const [gData, sessData] = await Promise.all([
  api.games().catch(() => ({ games: [] })),
  api.getActiveSessions().catch(() => ({ sessions: [] })),
])
allGames = gData.games || []
systems = [...new Set(allGames.map(g => g.sistema?.toLowerCase()).filter(Boolean))]

// Mapa: rom_id → sessão
let sessionsMap = {}
;(sessData.sessions || []).forEach(s => { sessionsMap[s.rom_id] = s })

// Mostra app
const intro = document.getElementById('rvIntro')
const app   = document.getElementById('retrovision')

if (isBack) {
  history.replaceState({}, '', '/retrovision.html')
  // Restaura posição salva
  const savedSys  = parseInt(sessionStorage.getItem('rc_rv_sys')  || '0')
  const savedGame = parseInt(sessionStorage.getItem('rc_rv_game') || '0')
  sessionStorage.removeItem('rc_rv_sys')
  sessionStorage.removeItem('rc_rv_game')
  if (!isNaN(savedSys) && savedSys < systems.length)   sysIdx  = savedSys
  if (!isNaN(savedGame)) gameIdx = savedGame
  intro.style.display = 'none'
  app.classList.remove('hidden')
  init()
} else {
  setTimeout(() => {
    intro.style.opacity = '0'
    intro.style.transition = 'opacity 0.4s'
    setTimeout(() => {
      intro.style.display = 'none'
      app.classList.remove('hidden')
      init()
    }, 400)
  }, 1800)
}

function init() {
  renderSystems()
  renderCarousel()
  renderInfo()
  startGamepad()
  setupGamepad()
  setupMouse()
  setupTouch()
  setupKeyboard()
  // Atualiza sessões a cada 15s
  setInterval(async () => {
    const d = await api.getActiveSessions().catch(() => null)
    if (!d) return
    sessionsMap = {}
    ;(d.sessions || []).forEach(s => { sessionsMap[s.rom_id] = s })
    renderInfo()
  }, 15000)
}

// Computed
function getFiltered() {
  return allGames.filter(g => g.sistema?.toLowerCase() === systems[sysIdx])
}
function getMeta() {
  return SYS_META[systems[sysIdx]] || DEF_META
}
function getCurrentGame() {
  const f = getFiltered()
  return f[Math.min(gameIdx, f.length-1)]
}

// Sistemas
function renderSystems() {
  const el = document.getElementById('rvSystems')
  el.innerHTML = systems.map((s, i) => {
    const m = SYS_META[s] || DEF_META
    const active = i === sysIdx
    return `<button class="rv-sys-btn${active?' active':''}" data-idx="${i}"
      style="color:${active ? m.glow : 'rgba(255,255,255,0.4)'}">
      ${m.logo
        ? `<img src="${m.logo}" style="height:${active?30:20}px;width:auto;max-width:80px;object-fit:contain;
             opacity:${active?1:0.4};transition:all 0.2s;filter:drop-shadow(0 0 4px ${m.glow})">`
        : `<span style="font-size:${active?'26px':'18px'}">🎮</span>`}
      <span class="rv-sys-label">${m.label}</span>
    </button>`
  }).join('')
  el.querySelectorAll('.rv-sys-btn').forEach(b => {
    b.addEventListener('click', () => { sysIdx = +b.dataset.idx; gameIdx = 0; update() })
  })
}

// Carrossel
function renderCarousel() {
  const filtered = getFiltered()
  const meta = getMeta()
  const safe = Math.min(gameIdx, Math.max(0, filtered.length-1))
  const wrap = document.getElementById('rvCards')
  if (!wrap) return

  // Índices que devem estar visíveis
  const visible = []
  for (let i = safe-RANGE; i <= safe+RANGE; i++) {
    if (i >= 0 && i < filtered.length) visible.push(i)
  }

  // Remove cards que saíram da janela
  wrap.querySelectorAll('.rv-card').forEach(el => {
    if (!visible.includes(+el.dataset.idx)) el.remove()
  })

  // Atualiza ou cria cada card
  visible.forEach(i => {
    const offset = i - safe
    const g = filtered[i]
    const abs = Math.abs(offset)
    const center = offset === 0
    const w = center ? 200 : 155
    const h = center ? 270 : 205
    const scale = center ? 1 : Math.max(0.52, 1 - abs*0.18)
    const tx = offset * 220
    const tz = center ? 50 : -abs*80
    const ry = offset * -12
    const op = center ? 1 : Math.max(0.25, 1-abs*0.25)
    const shadow = center
      ? '0 0 50px ' + meta.glow + '60,0 20px 50px rgba(0,0,0,0.9)'
      : '0 8px 30px rgba(0,0,0,0.7)'
    const border = center ? '2px solid ' + meta.glow + '50' : '1px solid #ffffff08'

    let card = wrap.querySelector('.rv-card[data-idx="' + i + '"]')

    if (!card) {
      // Cria novo card
      card = document.createElement('div')
      card.className = 'rv-card'
      card.dataset.idx = i

      const inner = document.createElement('div')
      inner.className = 'rv-card-inner'

      if (g.thumb) {
        const img = document.createElement('img')
        img.src = g.thumb
        img.alt = ''
        img.loading = 'lazy'
        img.decoding = 'async'
        img.onerror = function() { this.style.display = 'none' }
        inner.appendChild(img)
      } else {
        const ph = document.createElement('div')
        ph.className = 'rv-card-placeholder'
        ph.style.background = 'linear-gradient(135deg,' + meta.color + '30,#000)'
        ph.innerHTML = '<span style="font-size:36px">' + (meta.emoji||'🎮') + '</span><span>' + esc(g.nome) + '</span>'
        inner.appendChild(ph)
      }

      card.appendChild(inner)
      card.addEventListener('click', function() {
        const idx = +this.dataset.idx
        const s = Math.min(gameIdx, Math.max(0, getFiltered().length-1))
        if (idx === s) launchGame()
        else { gameIdx = idx; update() }
      })
      wrap.appendChild(card)
    }

    // Atualiza transform — CSS transition anima automaticamente
    card.style.transform = 'translateX(' + tx + 'px) translateZ(' + tz + 'px) rotateY(' + ry + 'deg) scale(' + scale + ')'
    card.style.opacity   = op
    card.style.zIndex    = 10 - abs

    const inner = card.querySelector('.rv-card-inner')
    if (inner) {
      inner.style.width     = w + 'px'
      inner.style.height    = h + 'px'
      inner.style.boxShadow = shadow
      inner.style.border    = border
    }
  })
}
function renderInfo() {
  const meta = getMeta()
  const g    = getCurrentGame()
  const filtered = getFiltered()
  const safe = Math.min(gameIdx, Math.max(0, filtered.length-1))

  document.getElementById('rvBg').style.background =
    `radial-gradient(ellipse 80% 60% at 50% 35%, ${meta.glow}15 0%, transparent 70%)`

  const btn = document.getElementById('rvPlayBtn')
  btn.style.background = `linear-gradient(135deg, ${meta.color}, ${meta.glow})`
  btn.style.boxShadow  = `0 4px 16px ${meta.glow}50`
  btn.style.color      = '#fff'
  btn.style.border     = 'none'

  document.getElementById('rvTitle').textContent = g?.nome || '—'
  document.getElementById('rvTitle').style.textShadow = `0 0 20px ${meta.glow}`
  document.getElementById('rvSub').textContent = g
    ? `${meta.label} · ${safe+1} / ${filtered.length}` : ''

  const session = g ? sessionsMap[g.id] : null
  const joinBtn = document.getElementById('rvJoinBtn')
  if (session && g) {
    joinBtn.style.display = ''
    joinBtn.style.background = `linear-gradient(135deg,#1d4ed8,#3b82f6)`
    joinBtn.style.boxShadow = `0 4px 16px #3b82f650`
    joinBtn.onclick = () => joinSession(g.id, session.room_id)
  } else {
    joinBtn.style.display = 'none'
  }

  if (!tvMode) {
    document.getElementById('rvHint').textContent = session
      ? '◀▶ navegar · A jogar · Y jogar junto · Guide menu · B sair'
      : '◀▶ navegar · A jogar · Guide menu · B sair'
  } else {
    document.getElementById('rvHint').textContent = '◀▶ navegar · A jogar · Guide menu'
  }
}

function joinSession(gameId, roomId) {
  sessionStorage.setItem('rc_from_rv', '1')
  sessionStorage.setItem('rc_rv_sys', sysIdx)
  sessionStorage.setItem('rc_rv_game', gameIdx)
  window.location.href = `/player.html?id=${gameId}&join=${roomId}`
}

function update() {
  renderSystems()
  renderCarousel()
  renderInfo()
}

// Launch
function launchGame() {
  const g = getCurrentGame()
  if (!g) return
  const meta = getMeta()

  // Animação de launch
  const overlay = document.createElement('div')
  overlay.className = 'launch-overlay'
  if (g.thumb) {
    overlay.innerHTML = `<div class="launch-card" style="width:240px;height:320px;box-shadow:0 0 80px ${meta.glow}">
      <img src="${g.thumb}" style="width:100%;height:100%;object-fit:cover">
    </div>`
  }
  document.body.appendChild(overlay)

  // Entra em fullscreen AGORA (dentro do gesture do clique em Jogar)
  document.documentElement.requestFullscreen?.().catch(() => {})

  setTimeout(() => {
    sessionStorage.setItem('rc_from_rv', '1')
    sessionStorage.setItem('rc_rv_sys', sysIdx)
    sessionStorage.setItem('rc_rv_game', gameIdx)
    window.location.href = `/player.html?id=${g.id}`
  }, 700)
}

document.getElementById('rvPlayBtn').addEventListener('click', launchGame)

// Menu Guide
const MENU_ITEMS = [
  { icon:'▶', label:'Continuar',           action: closeMenu },
  { icon:'🎮', label:'Configurar controle', action: () => { closeMenu(); openRemapRV() } },
  ...(tvMode ? [] : [{ icon:'🖥', label:'Modo Desktop', action: () => { closeMenu(); tryExit() } }]),
  { icon:'⏻',  label:'Sair da conta',       action: () => { logout() } },
]

function openMenu() {
  menuSel = 0
  const el = document.getElementById('rvMenuItems')
  el.innerHTML = MENU_ITEMS.map((item, i) =>
    `<button class="rv-menu-item${i===0?' selected':''}" data-idx="${i}">
      <span>${item.icon}</span><span>${item.label}</span>
    </button>`
  ).join('')
  el.querySelectorAll('.rv-menu-item').forEach(b => {
    b.addEventListener('click', () => MENU_ITEMS[+b.dataset.idx]?.action())
    b.addEventListener('mouseover', () => selectMenu(+b.dataset.idx))
  })
  document.getElementById('rvMenuOverlay').classList.remove('hidden')
  menuOpen = true
}

function closeMenu() {
  document.getElementById('rvMenuOverlay').classList.add('hidden')
  menuOpen = false
}

function selectMenu(i) {
  menuSel = i
  document.querySelectorAll('.rv-menu-item').forEach((b, idx) => {
    b.classList.toggle('selected', idx === i)
  })
  const meta = getMeta()
  document.querySelectorAll('.rv-menu-item.selected').forEach(b => {
    b.style.borderLeftColor = meta.glow
  })
}

// Confirmação saída
function tryExit() {
  if (tvMode) return
  const meta = getMeta()
  const box = document.getElementById('rvConfirmBox')
  box.style.borderColor = meta.glow
  document.getElementById('rvConfirm').classList.remove('hidden')
  document.getElementById('rvConfirmYes').style.background = meta.color
  confirmOpen = true
  confirmSel = 1  // padrão: Cancelar
}

document.getElementById('rvConfirmYes').addEventListener('click', () => { window.location.href = '/library.html' })
document.getElementById('rvConfirmNo').addEventListener('click',  () => {
  document.getElementById('rvConfirm').classList.add('hidden')
  confirmOpen = false
})

// Gamepad
function setupGamepad() {
  onGamepad((btn, type) => {
    if (type !== 'press' && type !== 'hold') return
    const press = type === 'press'
    const nav   = type === 'press' || type === 'hold'

    if (!document.getElementById('rvRemapOverlay').classList.contains('hidden')) {
      if (rvRemapListening !== null) {
        // Aguardando input — qualquer botão cancela (B/Guide)
        if (press && (btn === BTN.B || btn === BTN.GUIDE)) stopListeningRV()
      } else {
        if (press && btn === BTN.UP)   selectRemapRV(rvRemapSel - 1)
        if (press && btn === BTN.DOWN) selectRemapRV(rvRemapSel + 1)
        if (press && btn === BTN.A) {
          const a = RV_REMAP_ACTIONS[rvRemapSel]
          if (a) {
            const el = document.querySelector(`#rvRemapList .rv-menu-item[data-idx="${rvRemapSel}"] .remap-rv-label`)
            startListeningRV(a.btn, el)
          }
        }
        if (press && (btn === BTN.B || btn === BTN.GUIDE)) closeRemapRV()
      }
      return
    }

    if (menuOpen) {
      if (press && btn === BTN.UP)    selectMenu(Math.max(0, menuSel-1))
      if (press && btn === BTN.DOWN)  selectMenu(Math.min(MENU_ITEMS.length-1, menuSel+1))
      if (press && btn === BTN.A)     MENU_ITEMS[menuSel]?.action()
      if (press && (btn === BTN.B || btn === BTN.GUIDE)) closeMenu()
      return
    }

    if (confirmOpen) {
      if (press && (btn === BTN.LEFT || btn === BTN.RIGHT)) {
        confirmSel = confirmSel === 0 ? 1 : 0
        // Destaca botão selecionado
        const btns = document.querySelectorAll('#rvConfirmBox button')
        btns.forEach((b, i) => b.style.opacity = i === confirmSel ? '1' : '0.5')
      }
      if (press && btn === BTN.A) {
        if (confirmSel === 0) window.location.href = '/library.html'
        else { document.getElementById('rvConfirm').classList.add('hidden'); confirmOpen = false }
      }
      if (press && (btn === BTN.B || btn === BTN.X)) {
        document.getElementById('rvConfirm').classList.add('hidden')
        confirmOpen = false
      }
      return
    }

    // Navegação normal
    if (btn === BTN.LEFT || btn === BTN.RIGHT) {
      if (press) {
        navStart = performance.now()
        navPaged = false
        if (btn === BTN.LEFT)  navLeft()
        if (btn === BTN.RIGHT) navRight()
      } else if (type === 'hold') {
        const held = navStart ? performance.now() - navStart : 0
        if (held > 1000 || navPaged) {
          // Após 1s: pula página
          navPaged = true
          const f = getFiltered()
          if (btn === BTN.LEFT)  gameIdx = Math.max(0, Math.floor(gameIdx/PAGE-1)*PAGE)
          if (btn === BTN.RIGHT) gameIdx = Math.min(f.length-1, (Math.floor(gameIdx/PAGE)+1)*PAGE)
          update()
        } else {
          // Antes de 1s: continua navegando 1 a 1
          if (btn === BTN.LEFT)  navLeft()
          if (btn === BTN.RIGHT) navRight()
        }
      }
    }
    if (press && btn === BTN.UP)   { sysIdx = (sysIdx - 1 + systems.length) % systems.length; gameIdx = 0; navStart = 0; navPaged = false; update() }
    if (press && btn === BTN.DOWN) { sysIdx = (sysIdx + 1) % systems.length; gameIdx = 0; navStart = 0; navPaged = false; update() }
    if (press && btn === BTN.LB)   { sysIdx = (sysIdx - 1 + systems.length) % systems.length; gameIdx = 0; navStart = 0; navPaged = false; update() }
    if (press && btn === BTN.RB)   { sysIdx = (sysIdx + 1) % systems.length; gameIdx = 0; navStart = 0; navPaged = false; update() }
    if (press && btn === BTN.A)    launchGame()
    if (press && btn === BTN.Y) {
      const g = getCurrentGame()
      const sess = g ? sessionsMap[g.id] : null
      if (sess) joinSession(g.id, sess.room_id)
    }
    if (press && btn === BTN.GUIDE) openMenu()
    if (press && btn === BTN.B && !tvMode) tryExit()
  })
}

function navLeft(isHold = false) {
  const filtered = getFiltered()
  const held = isHold && navStart ? performance.now() - navStart : 0
  if (held > 2000) {
    const p = Math.floor(gameIdx / PAGE)
    gameIdx = Math.max(0, (p-1)*PAGE)
    navStart = performance.now()
  } else {
    gameIdx = Math.max(0, gameIdx-1)
  }
  update()
}
function navRight(isHold = false) {
  const filtered = getFiltered()
  const held = isHold && navStart ? performance.now() - navStart : 0
  if (held > 2000) {
    const p = Math.floor(gameIdx / PAGE)
    gameIdx = Math.min(filtered.length-1, (p+1)*PAGE)
    navStart = performance.now()
  } else {
    gameIdx = Math.min(filtered.length-1, gameIdx+1)
  }
  update()
}

// Mouse no carousel (clique delegado já no renderCarousel)
function setupMouse() {}

// Swipe touch
function setupTouch() {
  let tx0 = 0
  document.getElementById('rvCarousel').addEventListener('touchstart', e => { tx0 = e.touches[0].clientX }, {passive:true})
  document.getElementById('rvCarousel').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx0
    if (Math.abs(dx) > 40) {
      if (dx < 0) navRight()
      else        navLeft()
    }
  }, {passive:true})
}

// Teclado
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    if (menuOpen) {
      if (e.key === 'ArrowUp')    selectMenu(Math.max(0, menuSel-1))
      if (e.key === 'ArrowDown')  selectMenu(Math.min(MENU_ITEMS.length-1, menuSel+1))
      if (e.key === 'Enter')      MENU_ITEMS[menuSel]?.action()
      if (e.key === 'Escape')     closeMenu()
      return
    }
    if (e.key === 'ArrowLeft')  navLeft()
    if (e.key === 'ArrowRight') navRight()
    if (e.key === 'ArrowUp')    { sysIdx = Math.max(0, sysIdx-1); gameIdx=0; update() }
    if (e.key === 'ArrowDown')  { sysIdx = Math.min(systems.length-1, sysIdx+1); gameIdx=0; update() }
    if (e.key === 'Enter')      launchGame()
    if (e.key === 'Escape' && !tvMode) tryExit()
  })
}

// ── Remapeamento de controle (RetroVision) ─────────────────────────────────
const RV_REMAP_ACTIONS = [
  { name:'Guide (Menu)',   btn: BTN.GUIDE  },
  { name:'A (Confirmar)',  btn: BTN.A      },
  { name:'B (Voltar)',     btn: BTN.B      },
  { name:'Cima',           btn: BTN.UP     },
  { name:'Baixo',          btn: BTN.DOWN   },
  { name:'Esquerda',       btn: BTN.LEFT   },
  { name:'Direita',        btn: BTN.RIGHT  },
  { name:'LB (sistema ←)', btn: BTN.LB     },
  { name:'RB (sistema →)', btn: BTN.RB     },
]
const RV_BTN_NAMES = {
  [BTN.A]:'A', [BTN.B]:'B', [BTN.X]:'X', [BTN.Y]:'Y',
  [BTN.LB]:'LB', [BTN.RB]:'RB', [BTN.LT]:'LT', [BTN.RT]:'RT',
  [BTN.SELECT]:'Select', [BTN.START]:'Start',
  [BTN.UP]:'Cima', [BTN.DOWN]:'Baixo', [BTN.LEFT]:'Esq', [BTN.RIGHT]:'Dir',
  [BTN.GUIDE]:'Guide',
}

let rvRemapListening = null
let rvRemapInterval  = null
let rvRemapSel       = 0

function renderRemapRV() {
  const map = getMappings()
  const inv = {}
  Object.entries(map).forEach(([phys, virt]) => { inv[virt] = +phys })

  const list = document.getElementById('rvRemapList')
  list.innerHTML = RV_REMAP_ACTIONS.map((a, i) => {
    const physBtn = inv[a.btn] !== undefined ? inv[a.btn] : a.btn
    const label   = RV_BTN_NAMES[physBtn] !== undefined ? RV_BTN_NAMES[physBtn] : `Btn ${physBtn}`
    const sel     = i === rvRemapSel
    return `<button class="rv-menu-item${sel ? ' selected' : ''}" style="justify-content:space-between;padding:10px 16px" data-idx="${i}" data-virtual="${a.btn}">
      <span>${a.name}</span>
      <span class="remap-rv-label" style="font-size:11px;color:#66c0f4;background:#66c0f420;
        padding:2px 10px;border-radius:6px">${label}</span>
    </button>`
  }).join('')

  list.querySelectorAll('.rv-menu-item').forEach(b => {
    b.addEventListener('click', () => {
      rvRemapSel = +b.dataset.idx
      startListeningRV(+b.dataset.virtual, b.querySelector('.remap-rv-label'))
    })
    b.addEventListener('mouseover', () => { rvRemapSel = +b.dataset.idx; renderRemapRV() })
  })
}

function selectRemapRV(i) {
  rvRemapSel = Math.max(0, Math.min(RV_REMAP_ACTIONS.length - 1, i))
  renderRemapRV()
  // Scroll para item visível
  const el = document.querySelector(`#rvRemapList .rv-menu-item[data-idx="${rvRemapSel}"]`)
  el?.scrollIntoView({ block: 'nearest' })
}

function startListeningRV(virtualBtn, labelEl) {
  if (rvRemapListening !== null) stopListeningRV()
  rvRemapListening = virtualBtn
  if (labelEl) { labelEl.textContent = '...'; labelEl.style.background = '#66c0f440' }
  document.getElementById('rvRemapHint').textContent = 'Pressione um botão no controle...'

  let waitReleaseRV = true
  rvRemapInterval = setInterval(() => {
    const gps = navigator.getGamepads?.() || []
    const anyPressed = [...gps].some(gp => gp?.buttons.some(b => b.pressed))
    if (waitReleaseRV) { if (!anyPressed) waitReleaseRV = false; return }
    for (const gp of gps) {
      if (!gp) continue
      gp.buttons.forEach((btn, i) => {
        if (btn.pressed && rvRemapListening !== null) {
          setMapping(i, rvRemapListening)
          stopListeningRV()
          renderRemapRV()
        }
      })
    }
  }, 50)
}

function stopListeningRV() {
  if (rvRemapInterval) { clearInterval(rvRemapInterval); rvRemapInterval = null }
  rvRemapListening = null
  document.getElementById('rvRemapHint').textContent = 'Clique em um botão para remapear'
}

function openRemapRV() {
  rvRemapSel = 0
  renderRemapRV()
  document.getElementById('rvRemapOverlay').classList.remove('hidden')
}
function closeRemapRV() {
  stopListeningRV()
  document.getElementById('rvRemapOverlay').classList.add('hidden')
}

document.getElementById('rvRemapClose').addEventListener('click', closeRemapRV)
document.getElementById('rvRemapReset').addEventListener('click', () => { resetMappings(); renderRemapRV() })

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}
</script>
